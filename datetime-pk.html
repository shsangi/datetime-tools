<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>edge to edge · date + time with breathing space</title>
    <style>
        /* ABSOLUTE ZERO MARGINS — PURE BLACK, NO BORDERS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: black;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        /* single wrapper stretches to every pixel */
        .datetime-wrapper {
            background: black;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            overflow: hidden;
            padding: 0;
            margin: 0;
        }

        /* container with ROW direction - date and time side by side */
        .datetime-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            background: black;
            width: 100%;
            height: 100%;
            overflow: hidden;
            padding: 0 2vw;              /* breathing room on edges */
            margin: 0;
            gap: 0;
            white-space: nowrap;
        }

        /* ALL TEXT ELEMENTS -完全相同 */
        .datetime-part, .full-date, .full-time, .ampm-part {
            color: white;
            background: black;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            font-size: inherit;
            white-space: nowrap;
            line-height: 1;
            display: inline-block;
            text-rendering: optimizeLegibility;
            margin: 0;
            padding: 0;
            letter-spacing: -0.02em;
        }

        /* date with space after */
        .full-date {
            margin-right: 0.4em;           /* space after year */
        }

        /* time container */
        .full-time {
            display: inline-flex;
            align-items: center;
            margin-left: 0.1em;
        }

        /* AM/PM - EXACT same size as time now! */
        .ampm-part {
            font-size: 1em;                 /* SAME SIZE as time */
            font-weight: 700;
            margin-left: 0.3em;              /* space before AM/PM */
            margin-right: 0.1em;              /* space after AM/PM */
            opacity: 1;
            display: inline-block;
        }

        /* media query adjustments */
        @media (min-aspect-ratio: 4/1) {
            .full-date, .full-time { font-size: 120vh; }
        }

        @media (max-aspect-ratio: 1/4) {
            .full-date, .full-time { font-size: 70vw; }
        }

        @media (max-width: 320px) or (max-height: 320px) {
            .full-date, .full-time { font-size: 70vw; }
        }
    </style>
</head>
<body>
    <!-- date and time on SAME LINE with proper spacing -->
    <div class="datetime-wrapper">
        <div class="datetime-container">
            <span class="datetime-part full-date" id="currentDate">Fri, 6 Mar, 2026</span>
            <span class="datetime-part full-time" id="currentTime">12:00:00<span class="ampm-part" id="currentAmPm">PM</span></span>
        </div>
    </div>

    <script>
        (function() {
            // ---------- PAKISTAN TIME (UTC+5) ----------
            function getPakistanDateTime() {
                const now = new Date();
                const utcMillis = now.getTime() + (now.getTimezoneOffset() * 60000);
                return new Date(utcMillis + (3600000 * 5));
            }

            // ---------- FORMAT DATE: 'Fri, 6 Mar, 2026' ----------
            function formatPakistanDate() {
                const pDate = getPakistanDateTime();
                const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                const weekday = weekdays[pDate.getDay()];
                const day = pDate.getDate();
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                const month = months[pDate.getMonth()];
                const year = pDate.getFullYear();
                return `${weekday}, ${day} ${month}, ${year}`;
            }

            // ---------- FORMAT TIME WITH AM/PM: 'HH:MM:SS AM/PM' ----------
            function formatPakistanTime() {
                const pDate = getPakistanDateTime();
                let hours = pDate.getHours();
                const minutes = pDate.getMinutes().toString().padStart(2, '0');
                const seconds = pDate.getSeconds().toString().padStart(2, '0');
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                const timeStr = `${hours.toString().padStart(2, '0')}:${minutes}:${seconds}`;
                return { timeStr, ampm };
            }

            // DOM elements
            const dateSpan = document.getElementById('currentDate');
            const timeSpan = document.getElementById('currentTime');

            // update text content
            function updateDateTime() {
                dateSpan.textContent = formatPakistanDate();
                const { timeStr, ampm } = formatPakistanTime();
                
                // Clear and rebuild time span with am/pm - NO SPACE in HTML, all handled by CSS margins
                timeSpan.innerHTML = ''; 
                timeSpan.textContent = timeStr;
                
                // Create ampm span - now same size as time
                const ampmEl = document.createElement('span');
                ampmEl.className = 'ampm-part';
                ampmEl.id = 'currentAmPm';
                ampmEl.textContent = ampm;  // just the text, spacing from CSS
                timeSpan.appendChild(ampmEl);
            }

            // ---------- DYNAMIC FONT SIZING: fill viewport edge to edge ----------
            function stretchToEdges() {
                const container = document.querySelector('.datetime-container');
                const dateEl = dateSpan;
                const timeEl = timeSpan;

                if (!container || !dateEl || !timeEl) return;

                // Reset to reasonable base to measure natural widths
                dateEl.style.fontSize = '100px';
                timeEl.style.fontSize = '100px';   // same base for both
                
                const containerWidth = container.clientWidth;
                const containerHeight = container.clientHeight;

                // Get container padding (2vw each side) to account for breathing space
                const containerStyle = window.getComputedStyle(container);
                const paddingLeft = parseFloat(containerStyle.paddingLeft) || 0;
                const paddingRight = parseFloat(containerStyle.paddingRight) || 0;
                const availableWidth = containerWidth - paddingLeft - paddingRight;

                // measure combined width at base sizes
                const dateWidth = dateEl.scrollWidth;
                const timeWidth = timeEl.scrollWidth;
                const totalWidth = dateWidth + timeWidth;
                
                // heights (should be similar)
                const dateHeight = dateEl.scrollHeight;
                const timeHeight = timeEl.scrollHeight;
                const maxHeight = Math.max(dateHeight, timeHeight);

                if (totalWidth <= 0 || maxHeight <= 0) return;

                // calculate scale based on available width (accounting for padding)
                const widthScale = availableWidth / totalWidth;
                
                // calculate scale based on height
                const heightScale = containerHeight / maxHeight;

                // optimal scale is the smaller to fit both dimensions
                let optimalScale = Math.min(widthScale, heightScale);

                // apply scale (both at same size)
                let newFontSize = 100 * optimalScale;

                dateEl.style.fontSize = newFontSize + 'px';
                timeEl.style.fontSize = newFontSize + 'px';

                // fine-tuning: if total width exceeds container, shrink slightly
                const finalDateWidth = dateEl.scrollWidth;
                const finalTimeWidth = timeEl.scrollWidth;
                const finalTotalWidth = finalDateWidth + finalTimeWidth;
                
                if (finalTotalWidth > availableWidth) {
                    const correction = availableWidth / (finalTotalWidth * 1.02);
                    newFontSize *= correction;
                    
                    dateEl.style.fontSize = newFontSize + 'px';
                    timeEl.style.fontSize = newFontSize + 'px';
                }

                // also ensure height fits
                const finalHeight = Math.max(dateEl.scrollHeight, timeEl.scrollHeight);
                if (finalHeight > containerHeight) {
                    const heightCorrection = containerHeight / (finalHeight * 1.02);
                    dateEl.style.fontSize = (parseFloat(dateEl.style.fontSize) * heightCorrection) + 'px';
                    timeEl.style.fontSize = (parseFloat(timeEl.style.fontSize) * heightCorrection) + 'px';
                }

                // AM/PM now SAME SIZE as time (1em)
                const ampmEl = document.querySelector('.ampm-part');
                if (ampmEl) {
                    ampmEl.style.fontSize = '1em';      // exactly same as time
                    ampmEl.style.fontWeight = '700';
                    ampmEl.style.marginLeft = '0.3em';   // space before
                    ampmEl.style.marginRight = '0.1em';  // space after
                }
            }

            // initial update
            updateDateTime();

            // wait for layout, then stretch
            window.addEventListener('load', function() {
                updateDateTime();
                stretchToEdges();
            });

            window.addEventListener('resize', function() {
                stretchToEdges();
            });

            // update time every second
            setInterval(function() {
                const oldDateText = dateSpan.textContent;
                const newDateText = formatPakistanDate();
                const { timeStr, ampm } = formatPakistanTime();
                
                // update time
                const timeEl = document.getElementById('currentTime');
                timeEl.innerHTML = timeStr;
                const ampmEl = document.createElement('span');
                ampmEl.className = 'ampm-part';
                ampmEl.id = 'currentAmPm';
                ampmEl.textContent = ampm;
                ampmEl.style.fontSize = '1em';        // same size
                ampmEl.style.fontWeight = '700';
                ampmEl.style.marginLeft = '0.3em';
                ampmEl.style.marginRight = '0.1em';
                timeEl.appendChild(ampmEl);
                
                // update date only if changed
                if (oldDateText !== newDateText) {
                    dateSpan.textContent = newDateText;
                }
                
                // readjust size
                stretchToEdges();
            }, 1000);

            // extra size adjustments
            setInterval(stretchToEdges, 200);
        })();
    </script>
</body>
</html>
